# You can enable/disable this feature
ENABLED: true

SETTINGS:
  # Max players using RTP simultaneously
  PLAYERS-IN-RTP: 3
  # Max tries to find a valid RTP location before failing
  MAX-ATTEMPTS: 16

MESSAGES:
  # General RTP messages
  DISABLED: "&cRTP is currently disabled."
  COOLDOWN: "&cYou can't rtp for another {remaining}s."
  MAX-PLAYERS: "&cToo many players are using RTP right now. Please try again later."
  WORLD-NOT-EXIST: "&cThe world does not exist."
  # RTP process messages
  SEARCHING: "&aSearching for a safe location in {world}..."
  SAFE-LOCATION-FOUND: "&aSafe location found at: X:{x} Y:{y} Z:{z}"
  MAX-ATTEMPTS: "&cCould not find a safe location after %attempts% attempts."
  # Menu messages
  DESTINATION-DISABLED: "&cThis RTP destination is currently disabled."
  # Safety check messages (for debugging)
  UNSAFE-LOCATION: "&cThe location at X:{x} Y:{y} Z:{z} was rejected: {reason}"

WORLD-SETTINGS:
  world: # Overworld name
    MAX-RADIUS: 5000
    MIN-RADIUS: 500
    CENTER-X: 0
    CENTER-Z: 0
    COOLDOWN: 30 # In seconds
  world_nether:
    MAX-RADIUS: 500
    MIN-RADIUS: 50
    CENTER-X: 0
    CENTER-Z: 0
    COOLDOWN: 30 # In seconds
  world_the_end:
    MAX-RADIUS: 2000
    MIN-RADIUS: 150
    CENTER-X: 0
    CENTER-Z: 0
    COOLDOWN: 30 # In seconds

# Deny worlds from rtp command
DENIED-WORLDS:
  - afk

RTP-MENU:
  TITLE: "&8ʀᴀɴᴅᴏᴍ ᴛᴇʟᴇᴘᴏʀᴛ"
  SIZE: 27
  PLACEHOLDER: true
  BUTTONS:
    OVERWORLD:
      DISPLAY-NAME: "&#0bee88ᴏᴠᴇʀᴡᴏʀʟᴅ"
      MATERIAL: "GRASS_BLOCK"
      SLOT: 11
      WORLD: "world"
      ENABLED: true
      LORE:
        - "&fClick to randomly teleport"
        - ""
        - "&7Players: &b{players}"
        - "&7Ping: &b{ping}ms"
    NETHER:
      DISPLAY-NAME: "&#0bee88ɴᴇᴛʜᴇʀ"
      MATERIAL: "NETHERRACK"
      SLOT: 13
      WORLD: "world_nether"
      ENABLED: true
      LORE:
        - "&fClick to randomly teleport"
        - ""
        - "&7Players: &b{players}"
        - "&7Ping: &b{ping}ms"
    THE_END:
      DISPLAY-NAME: "&#0bee88ᴇɴᴅ"
      MATERIAL: "END_STONE"
      SLOT: 15
      WORLD: "world_the_end"
      ENABLED: true
      LORE:
        - "&fClick to randomly teleport"
        - ""
        - "&7Players: &b{players}"
        - "&7Ping: &b{ping}ms"

